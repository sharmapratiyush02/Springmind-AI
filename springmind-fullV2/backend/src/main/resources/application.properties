# ── SpringMind AI — works out of the box with H2 (no DB install needed) ──────

spring.application.name=springmind-ai-support
server.port=${PORT:8080}
server.servlet.context-path=/api

# H2 in-memory DB (default — zero setup)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:springminddb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway remains opt-in because local H2 uses JPA create-drop; set FLYWAY_ENABLED=true for managed DB migrations.
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:SpringMindAI_JWT_Secret_Key_Min32Chars_2026!}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# AI / NLP
app.nlp.enabled=false
app.sla.critical=2
app.sla.high=8
app.sla.medium=24
app.sla.low=72

# Email (disabled — mail health check excluded to prevent blocking all HTTP requests)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USER:noreply@springmind.ai}
spring.mail.password=${MAIL_PASS:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=1000
spring.mail.properties.mail.smtp.timeout=1000
spring.mail.properties.mail.smtp.writetimeout=1000
app.email.enabled=false
app.email.from=support@springmind.ai

# Auth security
app.auth.otp-expiration-minutes=5
app.auth.reset-token-expiration-minutes=30
app.auth.reset-url=${FRONTEND_RESET_URL:http://localhost:5173/login}
app.auth.customer-reset-url=${CUSTOMER_RESET_URL:http://localhost:5173/customer-portal.html}
app.auth.token-cleanup-delay-ms=300000

# Progress email reports
app.progress-email.enabled=true
app.progress-email.interval-minutes=10
app.progress-email.scan-delay-ms=60000
app.progress-email.initial-delay-ms=30000

# CORS — add your deployed frontend URL here or set CORS_ORIGINS env var
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4173,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,http://127.0.0.1:3000,null}

# Actuator — exclude mail health indicator (it blocks threads when smtp is unreachable)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# Logging
logging.level.com.springmind=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
