# ── SpringMind AI — works out of the box with H2 (no DB install needed) ──────

spring.application.name=springmind-ai-support
server.port=${PORT:8080}
server.servlet.context-path=/api

# H2 in-memory DB (default — zero setup)
spring.datasource.url=jdbc:h2:mem:springminddb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway OFF (JPA handles schema for H2)
spring.flyway.enabled=false

# JWT
app.jwt.secret=${JWT_SECRET:SpringMindAI_JWT_Secret_Key_Min32Chars_2024!}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# AI / NLP
app.nlp.enabled=false
app.sla.critical=2
app.sla.high=8
app.sla.medium=24
app.sla.low=72

# Email (disabled by default — set EMAIL_ENABLED=true in prod)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USER:noreply@springmind.ai}
spring.mail.password=${MAIL_PASS:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.enabled=false
app.email.from=support@springmind.ai

# CORS — add your deployed frontend URL here or set CORS_ORIGINS env var
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4173}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Logging
logging.level.com.springmind=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
